services:
  # --- База данных ---
  db:
    image: postgres:15-alpine
    container_name: myapp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: myapp_user
      POSTGRES_PASSWORD: myapp_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - myapp_network

  # --- Backend (Laravel) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myapp_backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000" 
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: myapp
      DB_USERNAME: myapp_user
      DB_PASSWORD: myapp_password
    depends_on:
      - db
    networks:
      - myapp_network
    command: php artisan serve --host=0.0.0.0 --port=8000

  # --- Frontend (React + Vite) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: myapp_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost/api
    depends_on:
      - backend
    networks:
      - myapp_network
    command: npm run dev -- --host

  # --- Nginx (Reverse Proxy) ---
  nginx:
    image: nginx:alpine
    container_name: myapp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - myapp_network


  # --- Adminer (UI для БД) ---
  adminer:
    image: adminer
    container_name: myapp_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - myapp_network

networks:
  myapp_network:
    driver: bridge

volumes:
  pgdata:
